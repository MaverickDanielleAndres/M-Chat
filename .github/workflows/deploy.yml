name: 🚀 Deploy — GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: 🏗️ Build for Deployment
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    outputs:
      artifact-name: dist-${{ github.sha }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_API_KEYS: ${{ secrets.VITE_GEMINI_API_KEYS }}
          VITE_GEMINI_MODEL: gemini-2.5-flash

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/dist/

  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  create-release:
    name: 🏷️ Create Release
    needs: [build, deploy]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 📋 Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline -20 --pretty=format:"- %s (%h)")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)")
          fi
          echo "COMMITS<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 🏷️ Create release tag and GitHub Release
        uses: actions/github-script@v7
        env:
          COMMITS: ${{ steps.changelog.outputs.COMMITS }}
        with:
          script: |
            const date = new Date().toISOString().split('T')[0];
            const tagName = `v${date}-${context.sha.substring(0, 7)}`;
            const commits = process.env.COMMITS || 'No commits';
            
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tagName}`,
              sha: context.sha,
            });
            
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: `M-Chat ${date}`,
              body: `## 🚀 Deployed to GitHub Pages\n\n### Changes\n${commits}\n\n**Commit**: ${context.sha}\n**Deployed**: ${new Date().toUTCString()}`,
              draft: false,
              prerelease: false,
            });
            
            console.log(`Created release ${tagName}`);
