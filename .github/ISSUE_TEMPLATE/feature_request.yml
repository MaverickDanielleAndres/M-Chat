name: ✨ Feature Request
description: Suggest a new feature or enhancement for M-Chat
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request
        Thanks for helping make M-Chat better! Please describe your idea clearly.

  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight checklist
      options:
        - label: I have searched existing issues and this feature hasn't been requested
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Feature Area
      description: Which area does this feature belong to?
      options:
        - AI Capabilities (new models, tools, etc.)
        - Chat UI / Experience
        - Voice / Audio
        - Image Generation
        - File Handling
        - Authentication
        - Settings / Personalization
        - Admin Dashboard
        - API / Integrations
        - Performance
        - Accessibility
        - Mobile Experience
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - 🔴 High — Core functionality or blocking issue
        - 🟡 Medium — Nice to have, improves experience
        - 🟢 Low — Minor improvement
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What's the current limitation?
      placeholder: As a user, I struggle to... / Currently there's no way to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see
      placeholder: I would like M-Chat to...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or alternative approaches?

  - type: textarea
    id: mockup
    attributes:
      label: Mockups / Examples
      description: Add screenshots, mockups, or links to similar features in other products

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, links, or references
