<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#f7f7f5" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#050507" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="M-Chat - Think Faster. Create Smarter. A premium AI workspace powered by Gemini." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="M-Chat" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>M-Chat</title>
    <script>
      // No-flash theme detection. Mirrors useTheme behavior.
      (function () {
        try {
          var raw = localStorage.getItem('m-chat-storage-v2');
          var theme = 'system';
          if (raw) {
            var parsed = JSON.parse(raw);
            theme = (parsed && parsed.state && parsed.state.settings && parsed.state.settings.theme) || 'system';
          }
          var isDark = theme === 'dark' ||
            (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.classList.toggle('light', !isDark);
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
